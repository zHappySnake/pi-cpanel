<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi - Home</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>

<body>

    <div class="container">
        <div class="content">
            <div class="header">
                <h1>Raspberry Pi</h1>
                <h2>Control Panel</h2>
            </div>

            <hr>

            <nav>
                <span><a class="active" href="/">Home</a></span>
                &nbsp;
                <span><a href="/console">Console</a></span>
                &nbsp;
                <span><a href="https://github.com/zHappySnake/pi-cpanel" target="_blank">Help</a></span>
            </nav>

            <hr>

            <div class="card thermometer">
                <p>Temperature: <br><span id="temp"><br></span></p>
            </div>

            &nbsp;

            <div class="card memory">
                <i></i>
                <p>Memory: <br><span id="memory"><br></span></p>
            </div>

            &nbsp;

            <div class="card cpu">
                <i></i>
                <p>CPU: <br><span id="cpu"><br></span></p>
            </div>

        </div>
    </div>

</body>

<script src="/socket.io/socket.io.js"></script>
<script>
    var socket = io();

    socket.on("temperature", (temp) => {
        document.getElementById("temp").innerText = temp + "°C"
    })

    socket.on("memory", (mem) => {
        mem = JSON.parse(mem)
        document.getElementById("memory").innerText = `${mem.used}/${mem.total}MB`
    })

    socket.on("cpu", (cpu) => {
        document.getElementById("cpu").innerText = cpu + "%"
    })
</script>

</html>
